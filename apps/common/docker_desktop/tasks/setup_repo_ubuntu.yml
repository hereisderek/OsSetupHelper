---
- name: Check if Docker is already installed
  ansible.builtin.command: docker --version
  register: docker_check
  failed_when: false
  changed_when: false

- name: Setup Docker repository for Ubuntu
  block:
    - name: Install prerequisite packages
      ansible.builtin.package:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
      become: true

    - name: Download Docker public GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /usr/share/keyrings/docker.asc
      become: true

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present
      become: true
  when: 
    - ansible_distribution == 'Ubuntu'
    - docker_check.rc != 0
