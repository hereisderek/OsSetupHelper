---
- name: Check if Sublime Text is already installed
  ansible.builtin.command: subl --version
  register: sublime_check
  failed_when: false
  changed_when: false

- name: Setup Sublime Text repository for Ubuntu
  block:
    - name: Download Sublime public GPG key
      ansible.builtin.get_url:
        url: https://download.sublimetext.com/sublimehq-pub.gpg
        dest: /usr/share/keyrings/sublimehq-pub.gpg
      become: true

    - name: Add Sublime Text repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/sublimehq-pub.gpg] https://download.sublimetext.com/ apt/stable/"
        filename: sublime-text
        state: present
      become: true
  when: 
    - ansible_distribution == 'Ubuntu'
    - sublime_check.rc != 0
