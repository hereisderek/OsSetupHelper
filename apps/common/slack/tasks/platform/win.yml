---
- name: Skip when Windows package id is undefined
  ansible.builtin.debug:
    msg: Windows package id is not defined for this role.
  when: app_pkg_win | length == 0

- name: Check existing package in winget
  ansible.windows.win_shell: winget list --exact --id {{ app_pkg_win }}
  register: app_win_state
  changed_when: false
  failed_when: false
  when: app_pkg_win | length > 0

- name: Install app on Windows
  ansible.windows.win_shell: winget install --exact --id {{ app_pkg_win }} --accept-package-agreements --accept-source-agreements
  when:
    - app_pkg_win | length > 0
    - app_win_state.rc != 0
