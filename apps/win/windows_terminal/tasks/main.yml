---
- name: Ensure this role runs only on Windows
  ansible.builtin.assert:
    that:
      - ansible_system == 'Win32NT'

- name: Check Windows Terminal package
  ansible.windows.win_shell: winget list --exact --id Microsoft.WindowsTerminal
  register: terminal_state
  changed_when: false
  failed_when: false

- name: Install Windows Terminal
  ansible.windows.win_shell: winget install --exact --id Microsoft.WindowsTerminal --accept-package-agreements --accept-source-agreements
  when: terminal_state.rc != 0
