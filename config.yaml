---
# ♊ OsSetupHelper Configuration
# This file defines which apps, tools, and settings will be applied to your system.

meta:
  version: "1.0"
  profile: "default"

execution:
  # If true, Ansible will always run with 'become: true' (sudo). 
  # Recommended to keep false and use -K if needed.
  always_elevated: false
  # If true, runs Ansible in check mode (dry run) without making changes.
  check_mode: false

selections:
  # GUI Applications
  # Syntax:
  #   role_name: true/false          (Short form)
  #   role_name: { enabled: true }   (Full form)
  apps:
    chrome: 
      enabled: false
      add_to_dock: true
    vscode:
      enabled: false
      # Automatically add to macOS Dock
      add_to_dock: true
      # List of VS Code extensions to install
      extensions:
        - ms-python.python
        - redhat.ansible
    sourcetree: false
    jetbrains_toolbox: 
      enabled: false
      # List of JetBrains IDEs to install via Toolbox
      ide_list:
        - PyCharm
        - IntelliJ IDEA
        - Android Studio
    sublime: false
    steam: false
    discord: 
      enabled: true
    spotify: 
      enabled: true
    notion: 
      enabled: true
    postman: false
    slack: 
      enabled: true
    obs_studio: 
      enabled: true
    docker_desktop: false
    freedownloadmanager: 
      enabled: true
    localsend: 
      enabled: true
    wechat: 
      enabled: true
    google_drive: 
      enabled: true
    pixpin: false
    
    # macOS Specific Apps
    iterm: 
      enabled: true
    charles: 
      enabled: true
    betterdisplay: 
      enabled: true
    stats: false
    appcleaner: false
    macs_fan_control: false
    displaylink_manager: false
    handbrake: false
    iina: 
      enabled: true
    raycast: 
      enabled: true
    xcode: 
      enabled: true
      add_to_dock: true
    utm: true

    # Linux Specific Apps
    gnome_tweaks: true
    gnome_shell_extensions: true

    # Windows Specific Apps
    wsl2: true
    windows_terminal: true
    winget: true
    powershell: true

  # Command-line Tools
  commandline_tools:
    nodejs: false
    zsh_ohmyzsh:
      enabled: true
      # Where to install Oh My Zsh
      custom_paths:
        install_dir: "~/.config/ohmyzsh"
    opencode: false
    gemini: false
    claudcode: false
    openjdk-latest: true
    openjdk-17: false
    
    # macOS Specific CLI
    mole: false
    mist_cli: false

  # System Settings & Optimizations
  settings:
    setup_hostname:
      enabled: false
      # Hostname for the machine
      hostname: "my-computer"

    setup_ssh_git:
      enabled: false
      # Git global configuration
      user_name: "Your Name"
      user_email: "your.email@example.com"
      # GitHub usernames to trust SSH keys from (fetched via API)
      github_trust_keys:
        - hereisderek
    
    setup_environment:
      enabled: false
      # Custom shell commands to add to ~/.config/env/env.sh
      env_sh: |
        # managed by ossetuphelper
        export PATH="$HOME/.local/bin:$PATH"
      app_files: {}
      
    macos_tweaks:
      enabled: false
      # Cleanup default macOS dock icons
      clean_docker_icon: true
      # Enable right-click on Apple mouse/trackpad
      allow_mouse_right_click: true
      # Swap Cmd and Opt keys on external (non-Apple) keyboards
      swap_external_keyboard_cmd_opt: false
      # Enable tap-to-click on trackpad
      allow_tap_to_click: true
      # Show hidden files in Finder
      show_hidden_files: false
      # Show all file extensions in Finder
      show_all_filename_extensions: false
      # Enable three-finger drag
      allow_three_finger_drag: false
      # Default Finder view to 'List'
      folder_list_view: true
      # Finder search defaults to current folder
      search_current_folder: true
      # Show icons on desktop
      show_desktop_hard_drives: true
      show_desktop_external_drives: true
      show_desktop_removable_media: true
      # Position icon labels on the right
      desktop_icons_right_label: true
      # Show additional item info on desktop icons
      desktop_icons_show_info: true
      # Show battery percentage in menu bar
      show_battery_percentage: true
      # Show volume indicator in menu bar
      show_volume_menu_bar: true
      # Set Oh My Zsh to auto-update
      omz_auto_update: true
      # Enable comments in interactive Zsh sessions
      zsh_interactive_comments: true
