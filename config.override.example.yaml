# ♊ OsSetupHelper Override Configuration Example
# Copy this to config.override.yaml to customize your local installation.

execution:
  always_elevated: false

selections:
  apps:
    vscode: true
    chrome: true

  settings:
    setup_hostname:
      enabled: true
      hostname: "derek-mac"

    setup_packages:
      enabled: true
      # Lists in setup_packages are COMBINED with config/config.yaml.
      # Use '!' prefix to BLACKLIST (remove) an item from the base config.
      mac:
        brew: 
          - "!wget"  # Remove wget from the base list
          - "htop"   # Add htop
        cask:
          - "iterm2"
      linux:
        apt: [tmux]
      win:
        winget: [Mozilla.Firefox]

    macos_tweaks:
      enabled: true
      show_hidden_files: true
      clean_docker_icon: true
