---
- name: Ensure this role runs only on macOS
  ansible.builtin.assert:
    that:
      - ansible_system == 'Darwin'

- name: Set hostname fact
  ansible.builtin.set_fact:
    target_hostname: "{{ selections.settings.macos_tweaks.hostname | default(normal_user + '-mac') }}"

- name: Get current macOS names
  ansible.builtin.shell: |
    echo "ComputerName: $(scutil --get ComputerName)"
    echo "HostName: $(scutil --get HostName 2>/dev/null || echo 'not set')"
    echo "LocalHostName: $(scutil --get LocalHostName)"
  register: current_mac_names
  changed_when: false

- name: Set macOS ComputerName
  ansible.builtin.command: "scutil --set ComputerName '{{ target_hostname }}'"
  become: true
  when: "('ComputerName: ' + target_hostname) not in current_mac_names.stdout"

- name: Set macOS HostName
  ansible.builtin.command: "scutil --set HostName '{{ target_hostname }}'"
  become: true
  when: "('HostName: ' + target_hostname) not in current_mac_names.stdout"

- name: Set macOS LocalHostName
  ansible.builtin.command: "scutil --set LocalHostName '{{ target_hostname }}'"
  become: true
  when: "('LocalHostName: ' + target_hostname) not in current_mac_names.stdout"

- name: Allow mouse right click
  community.general.osx_defaults:
    domain: com.apple.driver.AppleBluetoothMultitouch.mouse
    key: MouseButtonMode
    type: string
    value: TwoButton
  when: selections.settings.macos_tweaks.allow_mouse_right_click | default(true)

- name: Clean Docker icon (Hide from Dock)
  community.general.osx_defaults:
    domain: "{{ item }}"
    key: hideDockerDesktopIcon
    type: bool
    value: true
  loop:
    - com.electron.docker-frontend
    - com.docker.docker
  notify: Restart Dock
  failed_when: false
  when: selections.settings.macos_tweaks.clean_docker_icon | default(true)

- name: Swap external keyboard command and option keys
  ansible.builtin.shell: |
    hidutil property --set '{"UserKeyMapping":[{"HIDKeyboardModifierMappingSrc":0x7000000E3,"HIDKeyboardModifierMappingDst":0x7000000E7},{"HIDKeyboardModifierMappingSrc":0x7000000E7,"HIDKeyboardModifierMappingDst":0x7000000E3}]}'
  changed_when: false
  when: selections.settings.macos_tweaks.swap_external_keyboard_cmd_opt | default(false)

- name: Allow tap to click (Bluetooth Trackpad)
  community.general.osx_defaults:
    domain: com.apple.driver.AppleBluetoothMultitouch.trackpad
    key: Clicking
    type: int
    value: 1
  notify: Restart SystemUIServer
  when: selections.settings.macos_tweaks.allow_tap_to_click | default(true)

- name: Allow tap to click (Internal Trackpad)
  community.general.osx_defaults:
    domain: com.apple.AppleMultitouchTrackpad
    key: Clicking
    type: int
    value: 1
  notify: Restart SystemUIServer
  when: selections.settings.macos_tweaks.allow_tap_to_click | default(true)

- name: Allow tap to click (Global Mouse Behavior - Current Host)
  community.general.osx_defaults:
    domain: NSGlobalDomain
    host: currentHost
    key: com.apple.mouse.tapBehavior
    type: int
    value: 1
  notify: Restart SystemUIServer
  when: selections.settings.macos_tweaks.allow_tap_to_click | default(true)

- name: Allow tap to click (Global Mouse Behavior)
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: com.apple.mouse.tapBehavior
    type: int
    value: 1
  notify: Restart SystemUIServer
  when: selections.settings.macos_tweaks.allow_tap_to_click | default(true)

- name: Show hidden files in Finder
  community.general.osx_defaults:
    domain: com.apple.finder
    key: AppleShowAllFiles
    type: string
    value: "YES"
  notify: Restart Finder
  when: selections.settings.macos_tweaks.show_hidden_files | default(false)

- name: Show all filename extensions in Finder
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: AppleShowAllExtensions
    type: bool
    value: true
  notify: Restart Finder
  when: selections.settings.macos_tweaks.show_all_filename_extensions | default(true)

- name: Finder defaults to list view
  community.general.osx_defaults:
    domain: com.apple.finder
    key: FXPreferredViewStyle
    type: string
    value: Nlsv
  notify: Restart Finder
  when: selections.settings.macos_tweaks.folder_list_view | default(true)

- name: Search defaults to current folder
  community.general.osx_defaults:
    domain: com.apple.finder
    key: FXDefaultSearchScope
    type: string
    value: SCcf
  notify: Restart Finder
  when: selections.settings.macos_tweaks.search_current_folder | default(true)

- name: Show hard disks on desktop
  community.general.osx_defaults:
    domain: com.apple.finder
    key: ShowHardDrivesOnDesktop
    type: bool
    value: "{{ selections.settings.macos_tweaks.show_desktop_hard_drives | default(true) }}"
  notify: Restart Finder

- name: Show external disks on desktop
  community.general.osx_defaults:
    domain: com.apple.finder
    key: ShowExternalHardDrivesOnDesktop
    type: bool
    value: "{{ selections.settings.macos_tweaks.show_desktop_external_drives | default(true) }}"
  notify: Restart Finder

- name: Show removable media on desktop
  community.general.osx_defaults:
    domain: com.apple.finder
    key: ShowRemovableMediaOnDesktop
    type: bool
    value: "{{ selections.settings.macos_tweaks.show_desktop_removable_media | default(true) }}"
  notify: Restart Finder

- name: Desktop icon labels on right
  ansible.builtin.shell: /usr/libexec/PlistBuddy -c "Set :DesktopViewSettings:IconViewSettings:labelOnBottom false" ~/Library/Preferences/com.apple.finder.plist
  notify: Restart Finder
  changed_when: false
  when: selections.settings.macos_tweaks.desktop_icons_right_label | default(true)

- name: Show item info on desktop icons
  ansible.builtin.shell: /usr/libexec/PlistBuddy -c "Set :DesktopViewSettings:IconViewSettings:showItemInfo true" ~/Library/Preferences/com.apple.finder.plist
  notify: Restart Finder
  changed_when: false
  when: selections.settings.macos_tweaks.desktop_icons_show_info | default(true)

- name: Show battery percentage in menu bar
  community.general.osx_defaults:
    domain: com.apple.menuextra.battery
    key: ShowPercent
    type: string
    value: "YES"
  when: selections.settings.macos_tweaks.show_battery_percentage | default(true)

- name: Show battery in control center
  community.general.osx_defaults:
    domain: com.apple.controlcenter
    key: "NSStatusItem Visible Battery"
    type: bool
    value: true
  when: selections.settings.macos_tweaks.show_battery_percentage | default(true)

- name: Show volume in menu bar
  community.general.osx_defaults:
    domain: com.apple.controlcenter
    key: "NSStatusItem Visible Audio"
    type: bool
    value: true
  when: selections.settings.macos_tweaks.show_volume_menu_bar | default(true)

- name: Apply macOS Dock tweaks
  ansible.builtin.include_tasks: ../subtasks/dock/main.yml
  when: selections.settings.macos_tweaks.setup_dock | default(false)

- name: Enable interactive comments in Zsh
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    line: "setopt INTERACTIVE_COMMENTS"
    state: present
    create: yes
  when: selections.settings.macos_tweaks.zsh_interactive_comments | default(true)

- name: Flush handlers to apply macOS changes immediately
  ansible.builtin.meta: flush_handlers