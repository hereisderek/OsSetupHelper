---
# First, we need to make sure dockutil is installed so we can manipulate the Dock
- name: Ensure dockutil is installed (macOS)
  community.general.homebrew:
    name: dockutil
    state: present

# Now we remove the default apps. 
# Comment out or delete any app from this list that you want to keep.
- name: Remove default macOS Dock icons
  ansible.builtin.command: dockutil --remove '{{ item }}' --no-restart
  loop:
    - Launchpad
    - Safari
    - Messages
    - Mail
    - Maps
    - Photos
    - FaceTime
    - Calendar
    - Contacts
    - Reminders
    - Notes
    - Freeform
    - Music
    - TV
    - Podcasts
    - News
    # - App Store         # Uncomment to remove
    # - System Settings   # Uncomment to remove
  register: dockutil_result
  failed_when: 
    - dockutil_result.rc != 0
    - "'item not found' not in dockutil_result.stdout"
  changed_when: dockutil_result.rc == 0

# We use --no-restart in the loop above for speed, then restart the Dock once at the end.
- name: Restart macOS Dock to apply changes
  ansible.builtin.command: killall Dock
  when: dockutil_result.changed