---
- name: Ensure mas is installed (Mac App Store CLI)
  community.general.homebrew:
    name: mas
    state: present

- name: Check if app is already installed
  ansible.builtin.stat:
    path: "/Applications/{{ app_name }}.app"
  register: mas_app_stat

- name: Inform user about App Store installation (can be slow)
  ansible.builtin.debug:
    msg: "Installing {{ app_name }} from Mac App Store. This may take several minutes depending on the app size..."
  when: not mas_app_stat.stat.exists

- name: Install app via mas (App Store)
  ansible.builtin.command: "mas install {{ mas_id }}"
  become: true
  when: not mas_app_stat.stat.exists
  register: mas_result
  failed_when: false
  changed_when: mas_result.rc == 0

- name: Set mas failure fact
  ansible.builtin.set_fact:
    role_failed: true
    role_message: "Failed to install {{ app_name }} via mas (rc={{ mas_result.rc }}). Please ensure you are signed in to the Mac App Store and have previously 'purchased' or 'gotten' the app."
  when: 
    - not mas_app_stat.stat.exists
    - mas_result.rc != 0

- name: Add app to macOS Dock
  ansible.builtin.include_tasks: "{{ playbook_dir }}/_shared_tasks/mac_add_to_dock.yml"
  vars:
    dock_app_name: "{{ app_name }}"
  when:
    - app_name is defined
    - app_name | length > 0
    - selections.apps[ansible_role_name] is defined
    - selections.apps[ansible_role_name].enabled | default(false)
    - selections.apps[ansible_role_name].add_to_dock | default(false)
