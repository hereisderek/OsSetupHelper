---
- name: Determine platform-specific installer task file
  ansible.builtin.set_fact:
    platform_task_file: "{{ 'mac_install_cask.yml' if ansible_system == 'Darwin' else 'win_install_package.yml' if ansible_system == 'Win32NT' else 'linux_install_package.yml' }}"

- name: Resolve package and app names
  ansible.builtin.set_fact:
    resolved_pkg_name: "{{ app_pkg if app_pkg is defined else (app_pkg_mac if ansible_system == 'Darwin' else app_pkg_win if ansible_system == 'Win32NT' else app_pkg_linux if ansible_system == 'Linux' else '') }}"
    resolved_app_name: "{{ app_name if app_name is defined else (app_name_mac if ansible_system == 'Darwin' else '') }}"

- name: Include platform-specific installer
  ansible.builtin.include_tasks: "{{ playbook_dir }}/_shared_tasks/installer/{{ platform_task_file }}"
  vars:
    pkg_name: "{{ resolved_pkg_name }}"
    app_name: "{{ resolved_app_name }}"
  when: resolved_pkg_name | length > 0
