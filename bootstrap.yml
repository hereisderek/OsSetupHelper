---
- name: Local machine bootstrap
  hosts: localhost
  connection: local
  gather_facts: true
  become: "{{ execution.always_elevated | default(true) }}"

  vars:
    normal_user: "{{ lookup('env', 'SUDO_USER') | default(lookup('env', 'USER'), true) }}"
    # These will be overridden by extra-vars from the orchestrator
    discovered_apps_common: []
    discovered_apps_os: []
    discovered_commandline_tools_common: []
    discovered_commandline_tools_os: []
    discovered_settings_common: []
    discovered_settings_os: []

  tasks:
    - name: Pre-installation hooks
      block:
        - name: Run pre-install bash scripts
          ansible.builtin.shell: "bash {{ item }}"
          loop: "{{ query('fileglob', playbook_dir + '/config/preinstall/*.sh') | sort }}"
          when: query('fileglob', playbook_dir + '/config/preinstall/*.sh') | length > 0

        - name: Include pre-install ansible tasks
          ansible.builtin.include_tasks: "{{ playbook_dir }}/config/ansible_tasks/pre.yml"
          when: (playbook_dir + '/config/ansible_tasks/pre.yml') is exists

    - name: Include enabled common settings roles
      ansible.builtin.include_tasks: _shared_tasks/run_role_with_hooks.yml
      loop: "{{ discovered_settings_common }}"
      loop_control:
        loop_var: role_name
      vars:
        role_category: settings

    - name: Include enabled OS-specific settings roles
      ansible.builtin.include_tasks: _shared_tasks/run_role_with_hooks.yml
      loop: "{{ discovered_settings_os }}"
      loop_control:
        loop_var: role_name
      vars:
        role_category: settings

    - name: Include enabled common app roles
      ansible.builtin.include_tasks: _shared_tasks/run_role_with_hooks.yml
      loop: "{{ discovered_apps_common }}"
      loop_control:
        loop_var: role_name
      vars:
        role_category: apps

    - name: Include enabled OS-specific app roles
      ansible.builtin.include_tasks: _shared_tasks/run_role_with_hooks.yml
      loop: "{{ discovered_apps_os }}"
      loop_control:
        loop_var: role_name
      vars:
        role_category: apps

    - name: Include enabled common commandline tool roles
      ansible.builtin.include_tasks: _shared_tasks/run_role_with_hooks.yml
      loop: "{{ discovered_commandline_tools_common }}"
      loop_control:
        loop_var: role_name
      vars:
        role_category: commandline_tools

    - name: Include enabled OS-specific commandline tool roles
      ansible.builtin.include_tasks: _shared_tasks/run_role_with_hooks.yml
      loop: "{{ discovered_commandline_tools_os }}"
      loop_control:
        loop_var: role_name
      vars:
        role_category: commandline_tools

    - name: Post-installation hooks
      block:
        - name: Run post-install bash scripts
          ansible.builtin.shell: "bash {{ item }}"
          loop: "{{ query('fileglob', playbook_dir + '/config/postinstall/*.sh') | sort }}"
          when: query('fileglob', playbook_dir + '/config/postinstall/*.sh') | length > 0

        - name: Include post-install ansible tasks
          ansible.builtin.include_tasks: "{{ playbook_dir }}/config/ansible_tasks/post.yml"
          when: (playbook_dir + '/config/ansible_tasks/post.yml') is exists

  handlers:
    - name: Restart Finder
      ansible.builtin.command: killall Finder
      listen: "Restart Finder"
      when: ansible_system == 'Darwin'

    - name: Restart Dock
      ansible.builtin.command: killall Dock
      listen: "Restart Dock"
      when: ansible_system == 'Darwin'

    - name: Restart SystemUIServer
      ansible.builtin.command: killall SystemUIServer
      listen: "Restart SystemUIServer"
      when: ansible_system == 'Darwin'
